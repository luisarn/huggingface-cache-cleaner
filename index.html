<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Manage your local Hugging Face cache - view disk usage, search models, and delete them easily." />
    <meta name="theme-color" content="#fb8c00" />
    <title>Hugging Face Cache Cleaner</title>
    <style>
      /* Critical CSS for instant render */
      html, body, #app {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0d1117;
      }
      .loading-app {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 16px;
        color: #8b949e;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #30363d;
        border-top-color: #fb8c00;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading-app">
        <div class="loading-spinner"></div>
        <span>Loading...</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
